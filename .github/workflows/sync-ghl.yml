name: GHL Sync — horário comercial

on:
  schedule:
    # De hora em hora, 09h–18h BRT (12–21 UTC), seg–sáb
    - cron: '0 12-21 * * 1-6'
  workflow_dispatch:

jobs:
  sync-goiania:
    name: Sync — Goiânia
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ingestion

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ingestion/requirements.txt

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar sync GHL → Supabase
        env:
          GHL_API_KEY:               ${{ secrets.GHL_API_KEY_GOIANIA }}
          GHL_LOCATION_ID:           ${{ secrets.GHL_LOCATION_ID_GOIANIA }}
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python3 main.py

  sync-sp:
    name: Sync — São Paulo
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ingestion

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ingestion/requirements.txt

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar sync GHL → Supabase
        env:
          GHL_API_KEY:               ${{ secrets.GHL_API_KEY_SP }}
          GHL_LOCATION_ID:           ${{ secrets.GHL_LOCATION_ID_SP }}
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python3 main.py
