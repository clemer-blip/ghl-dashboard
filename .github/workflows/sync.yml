name: Meta Ads Sync — diário

on:
  schedule:
    # Uma vez por dia às 03:00 UTC (00:00 BRT)
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  sync-meta:
    name: Sync — Meta Ads
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ingestion

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ingestion/requirements.txt

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar sync Meta Ads → Supabase (campanha)
        env:
          META_ACCESS_TOKEN:         ${{ secrets.META_ACCESS_TOKEN }}
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python3 meta_main.py

      - name: Rodar sync Meta Ads → Supabase (criativos / ad-level)
        env:
          META_ACCESS_TOKEN:         ${{ secrets.META_ACCESS_TOKEN }}
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python3 meta_creative_main.py
